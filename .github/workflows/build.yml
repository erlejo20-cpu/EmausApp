name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar dependencias del sistema
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev python3-dev build-essential libsqlite3-dev lld
          pip3 install --user --upgrade "buildozer>=1.5.0" "Cython<3.0" virtualenv

      - name: Generar APK con Buildozer
        run: |
          # Importante: Aseguramos que el PATH de pip esté disponible
          export PATH=$PATH:$HOME/.local/bin
          yes | buildozer android debug
        
      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: MiApp-APK-Resultado
          path: bin/*.apk
          retention-days: 5
